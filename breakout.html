<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Breakout | RF Toolbox</title>
	<link rel="stylesheet" href="style.css">
	<style>
		.game-wrap { text-align: center; padding: 16px; }
		canvas { display: block; margin: 0 auto; background: #0a0a1a; border: 2px solid #AA77FF; cursor: none; }
		.hud { font-family: monospace; font-size: 14px; margin: 6px 0; }
		.msg { font-family: monospace; font-size: 13px; color: #AA77FF; min-height: 18px; margin: 4px 0; }
		button { margin: 4px; }
	</style>
	<script src="scores.js"></script>
	<script src="scores.js"></script>
</head>
<body class="no-nav">
	<header><h2><a href="index.html" style="color:white;text-decoration:none;">RF Toolbox</a></h2></header>
	<section>
		<div class="breadcrumb"><a href="index.html">⌂ Home</a></div>
		<article>
			<div class="game-wrap">
				<h3>Breakout</h3>
				<div class="hud">
					Score: <span id="score">0</span> &nbsp;|&nbsp;
					Lives: <span id="lives">3</span> &nbsp;|&nbsp;
					Level: <span id="level">1</span>
				</div>
				<canvas id="c" width="480" height="520"></canvas>
				<div class="msg" id="msg">Click or press Space to launch</div>
				<p style="font-family:monospace;font-size:11px;margin:4px 0;">Mouse or arrow keys to move &nbsp;|&nbsp; Space to launch</p>
			<div id="score-entry" style="max-width:480px;margin:8px auto 0;"></div>
			<div style="max-width:480px;margin:10px auto 0;text-align:left;">
				<div style="font-family:monospace;font-size:13px;color:#AA77FF;margin-bottom:4px;">&#127942; Leaderboard</div>
				<div id="lb"></div>
			</div>
			</div>
		</article>
	</section>
	<footer><p><a href="index.html">Home</a> . <a href="games.html">Game Zone</a></p></footer>

<script>
var C = document.getElementById('c');
var ctx = C.getContext('2d');
var W = 480, H = 520;
var WALL = 10, COLS = 14, ROWS = 10;
var BW = (W - WALL*2 - (COLS-1)*2) / COLS; // brick width ~30
var BH = 14, BGAP = 2;

// ── state ────────────────────────────────────────────────────────────────────
var score = 0, lives = 3, level = 1;
var bricks = [], powerups = [], particles = [];
var paddle, ball, launched, gameOver, won;
var keys = {}, mouseX = W/2;
var hiScore = 0;

// ── brick colours / hits ──────────────────────────────────────────────────────
// hits: how many times to destroy. colour cycles per hit.
var BRICK_TYPES = [
	{ hits: 1, colors: ['#AA77FF'],               pts: 10  },
	{ hits: 1, colors: ['#00ccff'],               pts: 20  },
	{ hits: 1, colors: ['#00ffcc'],               pts: 30  },
	{ hits: 2, colors: ['#ff8800','#ffcc44'],      pts: 50  },
	{ hits: 3, colors: ['#dd2222','#ff6644','#ffaa44'], pts: 100 },
	{ hits: 1, colors: ['#ff44aa'],               pts: 40  },
];

// ── procedural level generator ────────────────────────────────────────────────
function generateLevel(lvl) {
	bricks = [];
	var seed = lvl * 1337;
	function rng() { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; }

	var patterns = ['solid','checkerboard','diamond','pyramid','random','spiral','wave','fortress'];
	var pat = patterns[(lvl - 1) % patterns.length];

	for (var row = 0; row < ROWS; row++) {
		for (var col = 0; col < COLS; col++) {
			var place = false;
			var typeIdx = 0;

			// which pattern
			if (pat === 'solid') {
				place = row < 7;
				typeIdx = Math.min(row, BRICK_TYPES.length - 1);
			}
			else if (pat === 'checkerboard') {
				place = row < 8 && (row + col) % 2 === 0;
				typeIdx = (row % 2) + (lvl > 4 ? 2 : 0);
			}
			else if (pat === 'diamond') {
				var cx = COLS/2 - 0.5, cy = ROWS/2 - 0.5;
				var d = Math.abs(col - cx) + Math.abs(row - cy);
				place = d < 5;
				typeIdx = Math.floor(d);
			}
			else if (pat === 'pyramid') {
				var margin = row;
				place = col >= margin && col < COLS - margin && row < 7;
				typeIdx = row < 2 ? 4 : row < 4 ? 3 : row < 6 ? 1 : 0;
			}
			else if (pat === 'random') {
				place = rng() > (0.35 - lvl * 0.02);
				typeIdx = Math.floor(rng() * Math.min(lvl + 1, BRICK_TYPES.length));
			}
			else if (pat === 'spiral') {
				var fc = col - COLS/2 + 0.5, fr = row - ROWS/2 + 0.5;
				var angle = Math.atan2(fr, fc);
				var radius = Math.sqrt(fc*fc + fr*fr);
				var spiral = ((angle / Math.PI * 2 + radius) % 2 + 2) % 2;
				place = spiral < 1 && row < 9;
				typeIdx = Math.floor(radius) % BRICK_TYPES.length;
			}
			else if (pat === 'wave') {
				var waveRow = Math.round(3 + Math.sin(col / 2.2) * 2.5);
				place = row >= waveRow && row < waveRow + 4;
				typeIdx = (row - waveRow) + (lvl > 6 ? 2 : 0);
			}
			else if (pat === 'fortress') {
				var border = (row === 0 || row === ROWS-2 || col === 0 || col === COLS-1);
				var inner  = (row === 2 || row === ROWS-4 || col === 2 || col === COLS-3) && row > 0 && row < ROWS-2 && col > 0 && col < COLS-1;
				place = (border || inner) && row < 9;
				typeIdx = border ? 4 : 2;
			}

			if (!place) continue;

			// scale up difficulty with level
			var extraHits = Math.floor((lvl - 1) / 3);
			var t = BRICK_TYPES[Math.min(typeIdx, BRICK_TYPES.length - 1)];

			bricks.push({
				x: WALL + col * (BW + BGAP),
				y: WALL + 40 + row * (BH + BGAP),
				w: BW, h: BH,
				hitsLeft: t.hits + extraHits,
				maxHits:  t.hits + extraHits,
				colors: t.colors,
				pts: t.pts * lvl,
				powerup: rng() < 0.08 ? (rng() < 0.5 ? 'wide' : 'multi') : null
			});
		}
	}
}

// ── init game objects ─────────────────────────────────────────────────────────
function initPaddle() {
	paddle = { x: W/2 - 40, y: H - 40, w: 80, h: 12, speed: 7 };
}

function initBall() {
	ball = {
		x: paddle.x + paddle.w/2, y: paddle.y - 8,
		r: 6,
		dx: 0, dy: 0,
		speed: 4 + level * 0.3,
		trail: []
	};
	launched = false;
}

function resetLevel() {
	powerups = []; particles = [];
	initPaddle(); initBall();
	generateLevel(level);
	updateHUD();
}

function startGame() {
	score = 0; lives = 3; level = 1;
	gameOver = false; won = false;
	resetLevel();
}

// ── power-ups ─────────────────────────────────────────────────────────────────
var paddleTimer = 0;

function applyPowerup(type) {
	if (type === 'wide') {
		paddle.w = Math.min(paddle.w + 30, 140);
		paddleTimer = 400;
	}
}

// ── particles ─────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color) {
	for (var i = 0; i < 8; i++) {
		var angle = Math.random() * Math.PI * 2;
		var speed = 1 + Math.random() * 3;
		particles.push({ x:x, y:y, dx:Math.cos(angle)*speed, dy:Math.sin(angle)*speed, life:30, color:color });
	}
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
	document.getElementById('score').textContent = score;
	document.getElementById('lives').textContent = lives;
	document.getElementById('level').textContent = level;
}

// ── launch ────────────────────────────────────────────────────────────────────
function launch() {
	if (launched || gameOver) return;
	var angle = -Math.PI/2 + (Math.random() - 0.5) * 0.8;
	ball.dx = Math.cos(angle) * ball.speed;
	ball.dy = Math.sin(angle) * ball.speed;
	launched = true;
}

// ── collision helper ──────────────────────────────────────────────────────────
function ballHitsRect(bx, by, r, rx, ry, rw, rh) {
	var nearX = Math.max(rx, Math.min(bx, rx + rw));
	var nearY = Math.max(ry, Math.min(by, ry + rh));
	var dx = bx - nearX, dy = by - nearY;
	return dx*dx + dy*dy < r*r;
}

function resolveRect(bx, by, r, rx, ry, rw, rh) {
	// determine which side was hit
	var fromLeft  = Math.abs((bx - r) - (rx + rw));
	var fromRight = Math.abs((bx + r) - rx);
	var fromTop   = Math.abs((by - r) - (ry + rh));
	var fromBot   = Math.abs((by + r) - ry);
	var min = Math.min(fromLeft, fromRight, fromTop, fromBot);
	if (min === fromTop || min === fromBot) return 'y';
	return 'x';
}

// ── main tick ─────────────────────────────────────────────────────────────────
function tick() {
	if (gameOver || won) return;

	// paddle movement
	if (keys['ArrowLeft']  || keys['KeyA']) paddle.x -= paddle.speed;
	if (keys['ArrowRight'] || keys['KeyD']) paddle.x += paddle.speed;
	paddle.x = Math.max(WALL, Math.min(W - WALL - paddle.w, paddle.x));
	// mouse override
	paddle.x = Math.max(WALL, Math.min(W - WALL - paddle.w, mouseX - paddle.w/2));

	// paddle width decay
	if (paddleTimer > 0) {
		paddleTimer--;
		if (paddleTimer === 0) paddle.w = 80;
	}

	if (!launched) {
		ball.x = paddle.x + paddle.w/2;
		ball.y = paddle.y - ball.r - 1;
		return;
	}

	// ball trail
	ball.trail.push({x: ball.x, y: ball.y});
	if (ball.trail.length > 8) ball.trail.shift();

	ball.x += ball.dx;
	ball.y += ball.dy;

	// wall collisions
	if (ball.x - ball.r < WALL)        { ball.x = WALL + ball.r;        ball.dx = Math.abs(ball.dx); }
	if (ball.x + ball.r > W - WALL)    { ball.x = W - WALL - ball.r;    ball.dx = -Math.abs(ball.dx); }
	if (ball.y - ball.r < WALL + 30)   { ball.y = WALL + 30 + ball.r;   ball.dy = Math.abs(ball.dy); }

	// ball lost
	if (ball.y - ball.r > H + 10) {
		lives--;
		updateHUD();
		if (lives <= 0) { gameOver = true; if (score > hiScore) hiScore = score; showScoreEntry('score-entry','breakout',score,function(){renderLeaderboard('breakout','lb');}); return; }
		initBall();
		return;
	}

	// paddle collision
	if (ball.dy > 0 && ballHitsRect(ball.x, ball.y, ball.r, paddle.x, paddle.y, paddle.w, paddle.h)) {
		var rel = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2); // -1 to 1
		var angle = rel * (Math.PI/3);
		var spd = Math.sqrt(ball.dx*ball.dx + ball.dy*ball.dy);
		ball.dx = Math.sin(angle) * spd;
		ball.dy = -Math.abs(Math.cos(angle) * spd);
		ball.y = paddle.y - ball.r - 1;
	}

	// brick collisions
	for (var i = bricks.length - 1; i >= 0; i--) {
		var b = bricks[i];
		if (!ballHitsRect(ball.x, ball.y, ball.r, b.x, b.y, b.w, b.h)) continue;

		var side = resolveRect(ball.x, ball.y, ball.r, b.x, b.y, b.w, b.h);
		if (side === 'y') ball.dy *= -1; else ball.dx *= -1;

		b.hitsLeft--;
		var col = b.colors[b.maxHits - b.hitsLeft - 1] || b.colors[b.colors.length-1];
		spawnParticles(b.x + b.w/2, b.y + b.h/2, col);

		if (b.hitsLeft <= 0) {
			score += b.pts;
			updateHUD();
			if (b.powerup) {
				powerups.push({ x: b.x + b.w/2, y: b.y, type: b.powerup, dy: 2 });
			}
			bricks.splice(i, 1);
		}
		break;
	}

	// power-up movement & collection
	for (var j = powerups.length - 1; j >= 0; j--) {
		var p = powerups[j];
		p.y += p.dy;
		if (p.y > H) { powerups.splice(j, 1); continue; }
		if (p.y + 10 >= paddle.y && p.y <= paddle.y + paddle.h &&
		    p.x >= paddle.x && p.x <= paddle.x + paddle.w) {
			applyPowerup(p.type);
			powerups.splice(j, 1);
		}
	}

	// particles
	for (var k = particles.length - 1; k >= 0; k--) {
		var pt = particles[k];
		pt.x += pt.dx; pt.y += pt.dy; pt.dy += 0.1; pt.life--;
		if (pt.life <= 0) particles.splice(k, 1);
	}

	// level complete
	if (bricks.length === 0) {
		level++;
		if (level > 8) { won = true; if (score > hiScore) hiScore = score; showScoreEntry('score-entry','breakout',score,function(){renderLeaderboard('breakout','lb');}); return; }
		updateHUD();
		resetLevel();
	}
}

// ── draw ──────────────────────────────────────────────────────────────────────
function getBrickColor(brick) {
	var idx = brick.maxHits - brick.hitsLeft;
	return brick.colors[Math.min(idx, brick.colors.length - 1)];
}

function drawRoundRect(x, y, w, h, r) {
	ctx.beginPath();
	ctx.moveTo(x+r, y);
	ctx.lineTo(x+w-r, y);
	ctx.arcTo(x+w, y, x+w, y+r, r);
	ctx.lineTo(x+w, y+h-r);
	ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
	ctx.lineTo(x+r, y+h);
	ctx.arcTo(x, y+h, x, y+h-r, r);
	ctx.lineTo(x, y+r);
	ctx.arcTo(x, y, x+r, y, r);
	ctx.closePath();
}

function draw() {
	ctx.fillStyle = '#0a0a1a';
	ctx.fillRect(0, 0, W, H);

	// walls
	ctx.fillStyle = '#1a1a3a';
	ctx.fillRect(0, 0, WALL, H);
	ctx.fillRect(W - WALL, 0, WALL, H);
	ctx.fillRect(0, 0, W, WALL + 30);
	ctx.strokeStyle = '#AA77FF';
	ctx.lineWidth = 1;
	ctx.strokeRect(0.5, 0.5, W-1, H-1);

	// bricks
	bricks.forEach(function(b) {
		var col = getBrickColor(b);
		// glow
		ctx.shadowColor = col;
		ctx.shadowBlur = 6;
		ctx.fillStyle = col;
		drawRoundRect(b.x+1, b.y+1, b.w-2, b.h-2, 3);
		ctx.fill();
		// highlight
		ctx.shadowBlur = 0;
		ctx.fillStyle = 'rgba(255,255,255,0.18)';
		drawRoundRect(b.x+2, b.y+1, b.w-4, 4, 2);
		ctx.fill();
		// multi-hit crack overlay
		if (b.hitsLeft < b.maxHits) {
			ctx.strokeStyle = 'rgba(0,0,0,0.5)';
			ctx.lineWidth = 1;
			ctx.beginPath();
			ctx.moveTo(b.x + b.w*0.3, b.y+2);
			ctx.lineTo(b.x + b.w*0.5, b.y + b.h - 2);
			ctx.moveTo(b.x + b.w*0.6, b.y+2);
			ctx.lineTo(b.x + b.w*0.45, b.y + b.h - 2);
			ctx.stroke();
		}
	});
	ctx.shadowBlur = 0;

	// particles
	particles.forEach(function(p) {
		ctx.globalAlpha = p.life / 30;
		ctx.fillStyle = p.color;
		ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
	});
	ctx.globalAlpha = 1;

	// power-ups
	powerups.forEach(function(p) {
		ctx.fillStyle = p.type === 'wide' ? '#ffcc00' : '#00ffcc';
		ctx.shadowColor = ctx.fillStyle;
		ctx.shadowBlur = 8;
		ctx.fillRect(p.x - 8, p.y - 5, 16, 10);
		ctx.shadowBlur = 0;
		ctx.fillStyle = '#000';
		ctx.font = 'bold 8px monospace';
		ctx.textAlign = 'center';
		ctx.fillText(p.type === 'wide' ? 'W' : 'M', p.x, p.y + 3);
	});

	// ball trail
	ball.trail.forEach(function(t, i) {
		var alpha = (i / ball.trail.length) * 0.4;
		var r = ball.r * (i / ball.trail.length);
		ctx.globalAlpha = alpha;
		ctx.fillStyle = '#AA77FF';
		ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI*2); ctx.fill();
	});
	ctx.globalAlpha = 1;

	// ball
	ctx.shadowColor = '#AA77FF';
	ctx.shadowBlur = 14;
	ctx.fillStyle = '#fff';
	ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
	ctx.shadowBlur = 0;

	// paddle
	var grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
	grad.addColorStop(0, paddleTimer > 0 ? '#ffcc44' : '#AA77FF');
	grad.addColorStop(1, paddleTimer > 0 ? '#ff8800' : '#6633cc');
	ctx.fillStyle = grad;
	ctx.shadowColor = paddleTimer > 0 ? '#ffcc44' : '#AA77FF';
	ctx.shadowBlur = 10;
	drawRoundRect(paddle.x, paddle.y, paddle.w, paddle.h, 4);
	ctx.fill();
	ctx.shadowBlur = 0;

	// overlay states
	if (!launched && !gameOver && !won) {
		ctx.fillStyle = 'rgba(170,119,255,0.15)';
		ctx.fillRect(WALL, WALL+30, W-WALL*2, H-WALL-70);
		ctx.fillStyle = '#AA77FF';
		ctx.font = 'bold 16px monospace';
		ctx.textAlign = 'center';
		ctx.fillText('LEVEL ' + level, W/2, H/2 - 10);
		ctx.font = '13px monospace';
		ctx.fillStyle = '#aaa';
		ctx.fillText('Click or Space to launch', W/2, H/2 + 14);
	}

	if (gameOver) {
		ctx.fillStyle = 'rgba(10,10,26,0.82)';
		ctx.fillRect(0, 0, W, H);
		ctx.fillStyle = '#ff4444';
		ctx.font = 'bold 28px monospace';
		ctx.textAlign = 'center';
		ctx.fillText('GAME OVER', W/2, H/2 - 30);
		ctx.fillStyle = '#fff';
		ctx.font = '16px monospace';
		ctx.fillText('Score: ' + score, W/2, H/2 + 4);
		ctx.fillStyle = '#AA77FF';
		ctx.font = '13px monospace';
		ctx.fillText('Hi: ' + hiScore + '   — Click or Space to restart', W/2, H/2 + 28);
	}

	if (won) {
		ctx.fillStyle = 'rgba(10,10,26,0.82)';
		ctx.fillRect(0, 0, W, H);
		ctx.fillStyle = '#00ffcc';
		ctx.font = 'bold 26px monospace';
		ctx.textAlign = 'center';
		ctx.fillText('YOU WIN!', W/2, H/2 - 30);
		ctx.fillStyle = '#fff';
		ctx.font = '16px monospace';
		ctx.fillText('Score: ' + score, W/2, H/2 + 4);
		ctx.fillStyle = '#AA77FF';
		ctx.font = '13px monospace';
		ctx.fillText('Click or Space to play again', W/2, H/2 + 28);
	}
}

// ── game loop ─────────────────────────────────────────────────────────────────
function loop() {
	tick();
	draw();
	requestAnimationFrame(loop);
}

// ── input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
	keys[e.code] = true;
	if (e.code === 'Space') {
		e.preventDefault();
		if (gameOver || won) { startGame(); return; }
		launch();
	}
	if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', function(e) { keys[e.code] = false; });

C.addEventListener('mousemove', function(e) {
	var rect = C.getBoundingClientRect();
	mouseX = (e.clientX - rect.left) * (W / rect.width);
});

C.addEventListener('click', function() {
	if (gameOver || won) { startGame(); return; }
	launch();
});

// ── start ─────────────────────────────────────────────────────────────────────
startGame();
requestAnimationFrame(loop);
renderLeaderboard('breakout', 'lb');
</script>

</body>
</html>
