<script>
/* ── DiffPair (from DiffPair.html) ── */
(function(){
function msZ0(w,h,t,er){
  var weff=w+(t/Math.PI)*(1+Math.log(2*h/t));
  var u=weff/h;
  var fu=6+(2*Math.PI-6)*Math.exp(-Math.pow(30.666/u,0.7528));
  var Z0air=60*Math.log(fu/u+Math.sqrt(1+4/u/u));
  var a=1+(1/49)*Math.log((Math.pow(u,4)+Math.pow(u/52,2))/(Math.pow(u,4)+0.432))+
         (1/18.7)*Math.log(1+Math.pow(u/18.1,3));
  var b=0.564*Math.pow((er-0.9)/(er+3),0.053);
  var eeff=((er+1)/2+(er-1)/2*Math.pow(1+10/u,-a*b));
  return{Z0:Z0air/Math.sqrt(eeff),eeff:eeff};
}
document.getElementById('dp2-btn').addEventListener('click',function(){
  var w=parseFloat(document.getElementById('dp2-w').value);
  var s=parseFloat(document.getElementById('dp2-s').value);
  var h=parseFloat(document.getElementById('dp2-h').value);
  var t=parseFloat(document.getElementById('dp2-t').value);
  var er=parseFloat(document.getElementById('dp2-er').value);
  if([w,s,h,t,er].some(isNaN)||[w,s,h].some(function(v){return v<=0;})) return;
  var single=msZ0(w,h,t,er);
  var Z0=single.Z0;
  var Q=0.347*Math.exp(-2.655*s/h);

(function(){
document.getElementById('pt-btn').addEventListener('click',function(){
  var f=parseFloat(document.getElementById('pt-f').value)*parseFloat(document.getElementById('pt-fu').value);
  var R1=parseFloat(document.getElementById('pt-r1').value);
  var R2=parseFloat(document.getElementById('pt-r2').value);
  var Q=parseFloat(document.getElementById('pt-q').value);
  var topo=document.getElementById('pt-topo').value;
  if([f,R1,R2,Q].some(isNaN)||f<=0||R1<=0||R2<=0||Q<=0) return;
  var w=2*Math.PI*f;
  var Rh=Math.max(R1,R2), Rl=Math.min(R1,R2);
  var Qmin=Math.sqrt(Rh/Rl-1);
  if(Q<=Qmin) return;
  var Rv, Q2, E1,E2,E3, lbl1,lbl2,lbl3;
  if(topo==='pi-lp'||topo==='pi-hp'){
    Rv=Rh/(Q*Q+1);
    Q2=Math.sqrt(Rl/Rv-1);
    if(topo==='pi-lp'){
      E1=engFmt(Q/(w*Rh),'F'); lbl1='Shunt C₁';
      E2=engFmt(Rv*(Q+Q2)/w,'H'); lbl2='Series L';
      E3=engFmt(Q2/(w*Rl),'F'); lbl3='Shunt C₂';
    } else {
      E1=engFmt(Rh/(Q*w),'H'); lbl1='Shunt L₁';
      E2=engFmt(1/(w*Rv*(Q+Q2)),'F'); lbl2='Series C';
      E3=engFmt(Rl/(Q2*w),'H'); lbl3='Shunt L₂';
    }
  } else {
    Rv=Rh*(Q*Q+1);
    Q2=Math.sqrt(Rv/Rl-1);
    if(topo==='t-lp'){
      E1=engFmt(Q*Rh/w,'H'); lbl1='Series L₁';
      E2=engFmt((Q+Q2)/(w*Rv),'F'); lbl2='Shunt C';
      E3=engFmt(Q2*Rl/w,'H'); lbl3='Series L₂';
    } else {
      E1=engFmt(1/(Q*w*Rh),'F'); lbl1='Series C₁';
      E2=engFmt(Rv/((Q+Q2)*w),'H'); lbl2='Shunt L';
      E3=engFmt(1/(Q2*w*Rl),'F'); lbl3='Series C₂';
    }
  }
  var BW=f/Q;
  document.getElementById('pt-e1').textContent=lbl1+': '+E1;
  document.getElementById('pt-e2').textContent=lbl2+': '+E2;
  document.getElementById('pt-e3').textContent=lbl3+': '+E3;
  document.getElementById('pt-qv').textContent=Q.toFixed(3);
  document.getElementById('pt-bw').textContent=engFmt(BW,'Hz');
  document.getElementById('pt-rv').textContent=engFmt(Rv,'Ω');
});
})();
</script>

<script>
(function(){
/* ── AmpStability.js ── */
document.getElementById('amp-btn').addEventListener('click', amp_calc);
function amp_calc() {
  var s11m=parseFloat(document.getElementById('amp-s11m').value);
  var s11a=parseFloat(document.getElementById('amp-s11a').value)||0;
  var s12m=parseFloat(document.getElementById('amp-s12m').value);
  var s12a=parseFloat(document.getElementById('amp-s12a').value)||0;
  var s21m=parseFloat(document.getElementById('amp-s21m').value);
  var s21a=parseFloat(document.getElementById('amp-s21a').value)||0;
  var s22m=parseFloat(document.getElementById('amp-s22m').value);
  var s22a=parseFloat(document.getElementById('amp-s22a').value)||0;
  if(isNaN(s11m)||isNaN(s12m)||isNaN(s21m)||isNaN(s22m)) return;
  var d2r=Math.PI/180;
  var S11=polar(s11m,s11a*d2r), S12=polar(s12m,s12a*d2r);
  var S21=polar(s21m,s21a*d2r), S22=polar(s22m,s22a*d2r);
  var Delta=sub(mul(S11,S22),mul(S12,S21));
  var Dmag=cabs(Delta);
  var K=(1-s11m*s11m-s22m*s22m+Dmag*Dmag)/(2*s12m*s21m);
  var DeltaS11conj=mul(Delta,conj(S11));
  var mu=(1-s11m*s11m)/(cabs(sub(S22,DeltaS11conj))+s12m*s21m);
  var DeltaS22conj=mul(Delta,conj(S22));
  var mu2=(1-s22m*s22m)/(cabs(sub(S11,DeltaS22conj))+s12m*s21m);
  var uncond=(K>1&&Dmag<1);
  var S21_S12=s21m/s12m;
  var MAG_db, MSG_db=10*Math.log10(S21_S12);
  if(uncond) MAG_db=10*Math.log10(S21_S12)+10*Math.log10(K-Math.sqrt(K*K-1));
  var S21_db=20*Math.log10(s21m), S11_db=20*Math.log10(s11m), S22_db=20*Math.log10(s22m);
  amp_showResults({K:K,mu:mu,mu2:mu2,Dmag:Dmag,uncond:uncond,MAG_db:MAG_db,MSG_db:MSG_db,S21_db:S21_db,S11_db:S11_db,S22_db:S22_db});
}
function polar(r,t){return{re:r*Math.cos(t),im:r*Math.sin(t)};}
function mul(a,b){return{re:a.re*b.re-a.im*b.im,im:a.re*b.im+a.im*b.re};}
function sub(a,b){return{re:a.re-b.re,im:a.im-b.im};}
function conj(a){return{re:a.re,im:-a.im};}
function cabs(a){return Math.sqrt(a.re*a.re+a.im*a.im);}
function amp_showResults(r) {
  var container=document.getElementById('amp-results');
  container.innerHTML=''; container.style.display='grid';
  var verdict=r.uncond?'<span>Unconditionally stable</span>':'<span>Potentially unstable</span>';
  var card=document.createElement('div'); card.className='res-card';
  card.innerHTML='<h4>Stability Analysis</h4>'+
    rr2('Verdict',verdict)+
    rr2('Rollett K-factor',r.K.toFixed(4)+(r.K>1?' > 1 ✓':' < 1'),r.uncond)+
    rr2('|Δ| (det magnitude)',r.Dmag.toFixed(4)+(r.Dmag<1?' < 1 ✓':' ≥ 1'))+
    rr2('µ (input stability)',r.mu.toFixed(4)+(r.mu>1?' > 1 ✓':' ≤ 1'))+
    rr2("µ′ (output stability)",r.mu2.toFixed(4)+(r.mu2>1?' > 1 ✓':' ≤ 1'));
  var card2=document.createElement('div'); card2.className='res-card';
  card2.innerHTML='<h4>Gain Parameters</h4>'+
    rr2('|S₂₁| (forward gain)',r.S21_db.toFixed(2)+' dB')+
    rr2('|S₁₁| (input return loss)',r.S11_db.toFixed(2)+' dB')+
    rr2('|S₂₂| (output return loss)',r.S22_db.toFixed(2)+' dB')+
    rr2('MSG (max stable gain)',r.MSG_db.toFixed(2)+' dB')+
    (r.uncond?rr2('MAG (max available gain)',r.MAG_db.toFixed(2)+' dB',true):rr2('MAG','Undefined'));
  container.appendChild(card); container.appendChild(card2);
}
function rr2(lbl,val,hi){
  var s=hi?' style="font-weight:700;color:#AA77FF;"':'';
  return '<div class="res-row"><span class="res-lbl">'+lbl+'</span><span class="res-val"'+s+'>'+val+'</span></div>';
}
})();
</script>

  var Cv=parseFloat(document.getElementById('cr-C').value);

  var Rv=parseFloat(document.getElementById('cr-R').value)||0;
  var kv=parseFloat(document.getElementById('cr-k').value);
  var Mv=parseFloat(document.getElementById('cr-M').value);
  var Mv_u=parseFloat(document.getElementById('cr-M-unit').value);
  if(!(Lv>0)||!(Cv>0)) return;
  var L=Lv*Lmul, C=Cv*Cmul, R=Rv;
  var f0=1/(2*Math.PI*Math.sqrt(L*C));
  var w0=2*Math.PI*f0;
  var Q=(R>0)?w0*L/R:Infinity;
  var k;
  if(!isNaN(kv)&&kv>0) k=kv;
  else if(!isNaN(Mv)&&Mv>0) k=Mv*Mv_u/L;
  else return;
  if(k<=0||k>=1) return;
  var f_plus=f0/Math.sqrt(1-k), f_minus=f0/Math.sqrt(1+k);
  var BW=k*f0, Q_loaded=1/k;
  var k_crit=(Q<Infinity)?1/Q:0;
  var coupling_regime=(k<k_crit)?'Under-coupled':(k>k_crit?'Over-coupled':'Critically coupled');
  cr_showResults({f0:f0,f_plus:f_plus,f_minus:f_minus,BW:BW,Q:Q,Q_loaded:Q_loaded,k:k,k_crit:k_crit,coupling_regime:coupling_regime});
}

(function(){

document.getElementById('pll-btn').addEventListener('click', pll_calc);
function pll_calc(){
  var Kd=parseFloat(document.getElementById('pll-kd').value);
  var Ko=parseFloat(document.getElementById('pll-ko').value);
  var Ko_u=parseFloat(document.getElementById('pll-ko-unit').value);
  var N=parseFloat(document.getElementById('pll-n').value);
  var bw=parseFloat(document.getElementById('pll-bw').value);
  var bw_u=parseFloat(document.getElementById('pll-bw-unit').value);
  var pm=parseFloat(document.getElementById('pll-pm').value);
  if(!(Kd>0)||!(Ko>0)||!(N>0)||!(bw>0)||!(pm>0&&pm<90)) return;
  var Kvco=Ko*Ko_u, wc=2*Math.PI*bw*bw_u, phi=pm*Math.PI/180;
  var sinPhi=Math.sin(phi);
  var T2=sinPhi/(wc*(1-sinPhi));
  if(T2<=0) T2=1/wc;
  var T1=1/(wc*wc*T2);
  var C1=Kd*Kvco/(N*wc*wc*T1)*Math.sqrt(1+wc*wc*T2*T2);
  var R=T2/C1;
  var C2=0.1*C1, T3=R*C2;
  pll_showResults({T1:T1,T2:T2,T3:T3,R:R,C1:C1,C2:C2,wc:wc,pm:pm,N:N,Kd:Kd,Kvco:Kvco});

<script>
(function(){
/* ── SteppedImpedanceLPF.js ── */
var C0_si=2.998e8;
document.getElementById('silpf-btn').addEventListener('click', silpf_calc);
function silpf_calc(){
  var n=parseInt(document.getElementById('silpf-n').value)||3;
  var fc_v=parseFloat(document.getElementById('silpf-fc').value);
  var fc_mul=parseFloat(document.getElementById('silpf-fc-unit').value);
  var Zh=parseFloat(document.getElementById('silpf-zh').value)||120;
  var Zl=parseFloat(document.getElementById('silpf-zl').value)||20;
  var Z0=parseFloat(document.getElementById('silpf-z0').value)||50;
  var resp=document.getElementById('silpf-resp').value;
  var er=parseFloat(document.getElementById('silpf-er').value)||4.4;
  var h=parseFloat(document.getElementById('silpf-h').value)||1;
  if(!(fc_v>0)||n<1||n>9||Zh<=Z0||Zl>=Z0) return;
  var fc=fc_v*fc_mul;
  var g=si_prototype(n,resp);
  if(!g) return;
  var lam_sub=C0_si/(fc*Math.sqrt(er));
  var sections=[];
  for(var i=0;i<n;i++){
    var gk=g[i+1], isHigh=(i%2===0), Zk=isHigh?Zh:Zl;
    var beta_l_rad=isHigh?(gk*Z0/Zh):(gk*Zl/Z0);
    var beta_l_deg=beta_l_rad*180/Math.PI;
    var length_m=(beta_l_rad/(2*Math.PI))*lam_sub;
    var wh=si_zToW(Zk,er);
    sections.push({idx:i+1,type:isHigh?'High-Z (series L)':'Low-Z (shunt C)',gk:gk,Zk:Zk,beta_l_deg:beta_l_deg,length_m:length_m,wh:wh});
  }
  si_showResults(sections,fc,Z0,Zh,Zl,er,h,resp,n);
}
function si_prototype(n,resp){
  var butter={1:[1,2,1],2:[1,1.414,1.414,1],3:[1,1,2,1,1],4:[1,0.765,1.848,1.848,0.765,1],5:[1,0.618,1.618,2,1.618,0.618,1]};
  var cheby={1:[1,0.6986,1],2:[1,1.4029,0.7071,1.9841],3:[1,1.5963,1.0967,1.5963,1],4:[1,1.6703,1.1926,2.3661,0.8419,1.9841],5:[1,1.7058,1.2296,2.5408,1.2296,1.7058,1]};
  var tbl=(resp==='cheby')?cheby:butter;
  if(!tbl[n]){
    // fallback for n>5: use butter for simplicity
    var fullButter={6:[1,0.518,1.414,1.932,1.932,1.414,0.518,1],7:[1,0.445,1.247,1.802,2,1.802,1.247,0.445,1],8:[1,0.390,1.111,1.663,1.962,1.962,1.663,1.111,0.390,1],9:[1,0.347,1,1.532,1.879,2,1.879,1.532,1,0.347,1]};
    return fullButter[n]||null;
  }
  return tbl[n];
}
function si_zToW(Z,er){
  var A=Z/60*Math.sqrt((er+1)/2)+(er-1)/(er+1)*(0.23+0.11/er);
  var wh_n=8*Math.exp(A)/(Math.exp(2*A)-2);
  var B=377*Math.PI/(2*Z*Math.sqrt(er));
  var wh_w=2/Math.PI*(B-1-Math.log(2*B-1)+(er-1)/(2*er)*(Math.log(B-1)+0.39-0.61/er));
  return (wh_n<2)?wh_n:wh_w;
}
function si_showResults(sections,fc,Z0,Zh,Zl,er,h,resp,n){
  var container=document.getElementById('silpf-results');
  container.innerHTML=''; container.style.display='grid';
  var totalLen=sections.reduce(function(a,s){return a+s.length_m;},0);
  var sum=document.createElement('div'); sum.className='res-card';
  sum.innerHTML='<h4>Filter Summary</h4>'+
    rr7('Response',resp==='cheby'?'Chebyshev 0.5 dB ripple':'Butterworth')+
    rr7('Order',n)+
    rr7('Cutoff f_c',engFmt(fc,'Hz'))+
    rr7('High-Z lines',Zh.toFixed(0)+' Ω')+
    rr7('Low-Z lines',Zl.toFixed(0)+' Ω')+
    rr7('Total length',engFmt(totalLen,'m'),true);
  container.appendChild(sum);
  var card=document.createElement('div'); card.className='res-card';
  card.innerHTML='<h4>Section Dimensions</h4>';
  sections.forEach(function(s){
    var w_mm=s.wh*h;
    card.innerHTML+='<div class="res-row"><span class="res-lbl">'+s.idx+': '+s.type+'</span><span class="res-val">'+s.Zk.toFixed(0)+' Ω | '+s.beta_l_deg.toFixed(1)+'° | '+engFmt(s.length_m,'m')+' | w='+w_mm.toFixed(2)+'mm</span></div>';
  });
  container.appendChild(card);
}
function rr7(lbl,val,hi){var s=hi?' style="font-weight:700;color:#AA77FF;"':'';return '<div class="res-row"><span class="res-lbl">'+lbl+'</span><span class="res-val"'+s+'>'+val+'</span></div>';}
})();
</script>

<script>
(function() {
  document.getElementById('lc-btn').addEventListener('click', lc_solve);
  var Lmul_map = {'1':1e-6,'2':1e-9,'3':1e-12};
  var Cmul_map = {'1':1e-6,'2':1e-9,'3':1e-12};
  var fmul_map = {'0':1e3,'1':1e6,'2':1e9,'3':1e12};
  function lc_solve() {
    clearError();
    clearResults();
    var Lstr = document.getElementById('L').value.trim();
    var Cstr = document.getElementById('C').value.trim();
    var fstr = document.getElementById('f').value.trim();
    var LFilled = Lstr !== '';
    var CFilled = Cstr !== '';
    var fFilled = fstr !== '';
    var filled = (LFilled ? 1 : 0) + (CFilled ? 1 : 0) + (fFilled ? 1 : 0);
    if (filled < 2) { showError('Fill in any two fields; leave the third blank to solve for it.'); return; }
    if (filled === 3) { showError('Leave one field blank — the tool solves for the missing variable.'); return; }
    var Lmul = Lmul_map[document.getElementById('L-unit').value];
    var Cmul = Cmul_map[document.getElementById('C-unit').value];
    var fmul = fmul_map[document.getElementById('f-unit').value];
    var Lv, Cv, fv, solved;
    if (!fFilled) {
      Lv = parseFloat(Lstr) * Lmul;
      Cv = parseFloat(Cstr) * Cmul;
      if (!(Lv > 0) || !(Cv > 0)) { showError('Enter valid positive values for L and C.'); return; }
      fv = 1 / (2 * Math.PI * Math.sqrt(Lv * Cv));
      solved = 'f';
    } else if (!CFilled) {
      Lv = parseFloat(Lstr) * Lmul;
      fv = parseFloat(fstr) * fmul;
      if (!(Lv > 0) || !(fv > 0)) { showError('Enter valid positive values for L and f.'); return; }
      Cv = 1 / (4 * Math.PI * Math.PI * fv * fv * Lv);
      solved = 'C';
    } else {
      Cv = parseFloat(Cstr) * Cmul;
      fv = parseFloat(fstr) * fmul;
      if (!(Cv > 0) || !(fv > 0)) { showError('Enter valid positive values for C and f.'); return; }
      Lv = 1 / (4 * Math.PI * Math.PI * fv * fv * Cv);
      solved = 'L';
    }
    showResults(Lv, Cv, fv, solved);
    if (window.drawDiagram) window.drawDiagram(Lv, Cv, fv);
  }
  function showResults(L, C, f, solved) {
    var container = document.getElementById('lc-results');
    container.style.display = 'grid';
    var highlight = 'font-weight:700;color:#AA77FF;';
    var card = document.createElement('div');
    card.className = 'res-card';
    card.innerHTML =
      '<h4>LC Resonance</h4>' +
      resRow('Inductance, L',          engFmt(L, 'H'),              solved === 'L' ? highlight : '') +
      resRow('Capacitance, C',         engFmt(C, 'F'),              solved === 'C' ? highlight : '') +
      resRow('Resonant frequency, f₀', engFmt(f, 'Hz'),        solved === 'f' ? highlight : '') +
      resRow('Angular frequency, ω₀', engFmt(2*Math.PI*f,'rad/s'), '');
    container.appendChild(card);
  }
  function resRow(lbl, val, style) {
    return '<div class="res-row"><span class="res-lbl">' + lbl + '</span>' +
           '<span class="res-val" style="' + style + '">' + val + '</span></div>';
  }
  function clearResults() {
    var container = document.getElementById('lc-results');
    container.innerHTML = '';
    container.style.display = '';
  }
  function showError(msg) { var el = document.getElementById('lc-error'); if (el) el.textContent = msg; }
  function clearError()   { var el = document.getElementById('lc-error'); if (el) el.textContent = ''; }
})();
</script>
<script>
(function() {
  var C0 = 2.998e8;
  var MU0 = 4 * Math.PI * 1e-7;
  var EPS0 = 8.854e-12;
  document.getElementById('wg-btn').addEventListener('click', wg_calc);
  function wg_calc() {
    clearError();
    var av  = parseFloat(document.getElementById('wg-a').value);
    var amul = parseFloat(document.getElementById('wg-a-unit').value);
    var bv  = parseFloat(document.getElementById('wg-b').value);
    var bmul = parseFloat(document.getElementById('wg-b-unit').value);
    var fv  = parseFloat(document.getElementById('wg-f').value);
    var fmul = parseFloat(document.getElementById('wg-f-unit').value);
    var er  = parseFloat(document.getElementById('wg-er').value) || 1;
    var sigmav = parseFloat(document.getElementById('wg-sigma').value) || 5.8e7;
    var tanD = parseFloat(document.getElementById('wg-tanD').value) || 0;
    if (!(av > 0)) { showError('Enter a valid broad-wall dimension a.'); return; }
    if (!(bv > 0)) { showError('Enter a valid narrow-wall dimension b.'); return; }
    if (!(fv > 0)) { showError('Enter a valid operating frequency.'); return; }
    var a = av * amul;
    var b = bv * bmul;
    var f = fv * fmul;
    if (b >= a) { showError('b must be less than a (narrow wall < broad wall).'); return; }
    var mu  = MU0;
    var eps = er * EPS0;
    var vp_med = 1 / Math.sqrt(mu * eps);
    var modes = [];
    for (var m = 0; m <= 3; m++) {
      for (var n = 0; n <= 3; n++) {
        if (m === 0 && n === 0) continue;
        var fc = vp_med / 2 * Math.sqrt((m/a)*(m/a) + (n/b)*(n/b));
        modes.push({ m:m, n:n, fc:fc, label:'TE'+m+n });
      }
    }
    for (var m2 = 1; m2 <= 3; m2++) {
      for (var n2 = 1; n2 <= 3; n2++) {
        var fc2 = vp_med / 2 * Math.sqrt((m2/a)*(m2/a) + (n2/b)*(n2/b));
        modes.push({ m:m2, n:n2, fc:fc2, label:'TM'+m2+n2 });
      }
    }
    modes.sort(function(x,y){ return x.fc - y.fc; });
    var seen = {}, uniqModes = [];
    modes.forEach(function(mo) { if (!seen[mo.label]) { seen[mo.label]=true; uniqModes.push(mo); } });
    modes = uniqModes.slice(0, 8);
    var fc10 = vp_med / (2 * a);
    var fc20 = vp_med / a;
    var fc01 = vp_med / (2 * b);
    var result = { a:a, b:b, f:f, fc10:fc10, fc20:fc20, fc01:fc01, er:er, modes:modes, sigma:sigmav, tanD:tanD };
    if (f > fc10) {
      var k0   = 2 * Math.PI * f / C0;
      var km   = k0 * Math.sqrt(er);
      var kc   = Math.PI / a;
      var beta = Math.sqrt(km*km - kc*kc);
      var lambda_g = 2 * Math.PI / beta;
      var Zw   = (2 * Math.PI * f * MU0) / beta;
      var vph  = 2 * Math.PI * f / beta;
      var vgr  = (beta / (2*Math.PI*f)) * C0*C0 / er;
      var Rs   = Math.sqrt(Math.PI * f * MU0 / sigmav);
      var w2   = 2*Math.PI*f;
      var alpha_c_npm = Rs / (a*a*a * b * beta * w2 * MU0) * (2*b*Math.PI*Math.PI + a*a*a*beta*beta);
      var alpha_c = 8.686 * alpha_c_npm;
      var alpha_d = (tanD > 0 && er > 1) ? 8.686 * km*km * tanD / (2*beta) : 0;
      result.beta = beta; result.lambda_g = lambda_g; result.Zw = Zw;
      result.vph = vph; result.vgr = vgr; result.alpha_c = alpha_c; result.alpha_d = alpha_d;
    }
    showResults(result);
    if (window.drawDiagram) window.drawDiagram(result);
  }
  function showResults(res) {
    var container = document.getElementById('wg-results');
    container.innerHTML = '';
    container.style.display = 'grid';
    var fc10 = res.fc10;
    var ratio = res.f / fc10;
    var aboveCutoff = res.f > fc10;
    var card1 = document.createElement('div');
    card1.className = 'res-card';
    card1.innerHTML = '<h4>TE₁₀ Dominant Mode</h4>' +
      rr('TE₁₀ cutoff frequency, f<sub>c10</sub>', engFmt(fc10,'Hz')) +
      rr('Operating frequency', engFmt(res.f,'Hz')) +
      rr('f / f<sub>c10</sub>', ratio.toFixed(3) + (aboveCutoff ? ' — propagating' : ' — EVANESCENT'), false, true);
    if (aboveCutoff) {
      card1.innerHTML +=
        rr('Guide wavelength, λ<sub>g</sub>', engFmt(res.lambda_g,'m')) +
        rr('TE₁₀ wave impedance, Z<sub>w</sub>', res.Zw.toFixed(2)+' Ω') +
        rr('Phase velocity, v<sub>ph</sub>', (res.vph/C0).toFixed(3)+' × c') +
        rr('Group velocity, v<sub>gr</sub>', (res.vgr/C0).toFixed(3)+' × c') +
        rr('Conductor loss, α<sub>c</sub>', res.alpha_c.toFixed(4)+' dB/m') +
        rr('Dielectric loss, α<sub>d</sub>', res.alpha_d.toFixed(4)+' dB/m');
    }
    container.appendChild(card1);
    var card2 = document.createElement('div');
    card2.className = 'res-card';
    card2.innerHTML = '<h4>Mode Cutoff Frequencies</h4>';
    res.modes.forEach(function(mo) {
      var propagates = res.f > mo.fc;
      var style = propagates ? 'color:#AA77FF;font-weight:600;' : 'color:#aaa;';
      card2.innerHTML += '<div class="res-row"><span class="res-lbl" style="' + style + '">' + mo.label + '</span>' +
        '<span class="res-val" style="' + style + '">' + engFmt(mo.fc,'Hz') + (propagates ? ' ✓' : '') + '</span></div>';
    });
    container.appendChild(card2);
  }
  function rr(lbl, val, hi, raw) {
    var s = hi ? ' style="font-weight:700;color:#AA77FF;"' : '';
    return '<div class="res-row"><span class="res-lbl">' + lbl + '</span><span class="res-val"' + s + '>' + val + '</span></div>';
  }
  function showError(msg) { var el = document.getElementById('wg-error'); if (el) el.textContent = msg; }
  function clearError()   { var el = document.getElementById('wg-error'); if (el) el.textContent = ''; }
})();
</script>

<script>
/* ── VSWRConverter (from VSWRConverter.html) ── */
function vswrUpdate(src) {
  var vswr,gamma,rl,ml;
  try {
    if(src==='vswr')  { vswr =parseFloat(document.getElementById('v-vswr').value);  if(vswr<1)throw 1; gamma=(vswr-1)/(vswr+1); }
    else if(src==='gamma') { gamma=parseFloat(document.getElementById('v-gamma').value); if(gamma<0||gamma>1)throw 1; vswr=(1+gamma)/(1-gamma); }
    else if(src==='rl') { rl=parseFloat(document.getElementById('v-rl').value); if(rl<0)throw 1; gamma=Math.pow(10,-rl/20); vswr=(1+gamma)/(1-gamma); }
    else { ml=parseFloat(document.getElementById('v-ml').value); if(ml<0)throw 1; gamma=Math.sqrt(1-Math.pow(10,-ml/10)); vswr=(1+gamma)/(1-gamma); }
    if(!isFinite(vswr)||!isFinite(gamma)) throw 1;
    rl  = -20*Math.log10(gamma);
    ml  = -10*Math.log10(1-gamma*gamma);
    var tx = (1-gamma*gamma)*100;
    document.getElementById('ro-vswr').textContent  = vswr.toFixed(4);
    document.getElementById('ro-gamma').textContent = gamma.toFixed(4);
    document.getElementById('ro-rl').textContent    = (isFinite(rl)?rl.toFixed(2):'∞')+' dB';
    document.getElementById('ro-ml').textContent    = ml.toFixed(4)+' dB';
    document.getElementById('ro-tx').textContent    = tx.toFixed(2)+'%';
    document.getElementById('error').textContent='';
  } catch(e) { document.getElementById('error').textContent='Enter a valid value.'; }
}

/* ── Stripline (from Stripline.html) ── */
document.getElementById('sl-btn').addEventListener('click', function(){
  var w=parseFloat(document.getElementById('sl-w').value);
  var b=parseFloat(document.getElementById('sl-b').value);
  var t=parseFloat(document.getElementById('sl-t').value);
  var er=parseFloat(document.getElementById('sl-er').value);
  document.getElementById('error').textContent='';
  if([w,b,t,er].some(isNaN)||w<=0||b<=0||t<=0||er<1){document.getElementById('error').textContent='Enter valid positive values.';return;}
  if(t>=b){document.getElementById('error').textContent='Trace thickness t must be less than ground separation b.';return;}
  var weff=w*(1-(t/b)*Math.log(2-t/b)/Math.PI);
  var Z0=(60/Math.sqrt(er))*Math.log(4*b/(0.67*Math.PI*weff*(0.8+t/weff)));
  var vp=3e8/Math.sqrt(er);
  var C=er/Z0/vp*1e12;
  var L=Z0/vp*1e9;
  document.getElementById('sl-z0').textContent=Z0.toFixed(3)+' Ω';
  document.getElementById('sl-vp').textContent=(vp/1e8).toFixed(3)+'×10⁸ m/s';
  document.getElementById('sl-c').textContent=C.toFixed(2)+' pF/m';
  document.getElementById('sl-l').textContent=L.toFixed(2)+' nH/m';
});

/* ── IP3Calc (from IP3Calc.html) ── */
document.getElementById('ip-btn').addEventListener('click', function(){
  var IIP3=parseFloat(document.getElementById('ip-iip3').value);
  var Pin=parseFloat(document.getElementById('ip-pin').value);
  var G=parseFloat(document.getElementById('ip-gain').value);
  document.getElementById('error').textContent='';
  if([IIP3,Pin,G].some(isNaN)){document.getElementById('error').textContent='Enter valid numeric values.';return;}
  var OIP3=IIP3+G;
  var Pout=Pin+G;
  var IM3=3*Pin-2*IIP3+G;
  var IMD=Pout-IM3;
  var P1dB=IIP3-9.6;
  document.getElementById('ip-pout').textContent=Pout.toFixed(1)+' dBm';
  document.getElementById('ip-oip3').textContent=OIP3.toFixed(1)+' dBm';
  document.getElementById('ip-im3').textContent=IM3.toFixed(1)+' dBm';
  document.getElementById('ip-imd').textContent=IMD.toFixed(1)+' dBc';
  document.getElementById('ip-headroom').textContent=(IIP3-Pin).toFixed(1)+' dB';
  document.getElementById('ip-oheadroom').textContent=(OIP3-Pout).toFixed(1)+' dB';
  document.getElementById('ip-p1db').textContent=P1dB.toFixed(1)+' dBm (input)';
});
</script>

// ── Test runner ─────────────────────────────────────────────────
function readOutput(spec) {
  if (spec.includes('@')) {
    var parts = spec.split('@');
    var containerId = parts[0], idx = parseInt(parts[1]);
    var vals = document.querySelectorAll('#' + containerId + ' .res-val');
    return vals[idx] ? vals[idx].textContent.trim() : '';
  }
  var el = document.getElementById(spec);
  return el ? el.textContent.trim() : '';
}

function runTest(t) {
  // Optional pre-test setup (reactive tools, NoiseFigure stages, etc.)
  if (t.setup) { t.setup(); return checkOutputs(t); }

  // Set text inputs
  for (var id in (t.inputs || {})) {
    var el = document.getElementById(id);
    if (el) el.value = t.inputs[id];
  }
  // Set selects
  for (var id in (t.selects || {})) {
    var el = document.getElementById(id);
    if (el) el.value = t.selects[id];
  }
  // Click the calculate button
  var btn = document.getElementById(t.button);
  if (btn) btn.click();

  return checkOutputs(t);
}

function checkOutputs(t) {
  var checks = [];
  for (var spec in t.expect) {
    var exp = t.expect[spec];
    var raw = readOutput(spec);
    var actual = parseFloat(raw);
    var ok = isFinite(actual) && Math.abs(actual - exp.value) <= exp.tol;
    checks.push({ id: spec, label: exp.label, actual: actual, expected: exp.value, tol: exp.tol, raw: raw, ok: ok });
  }
  return checks;
}

// ── Renderer ────────────────────────────────────────────────────
function renderResults(groups) {
  var totalPass = 0, totalFail = 0;
  for (var g in groups)
    for (var ti = 0; ti < groups[g].length; ti++)
      for (var ci = 0; ci < groups[g][ti].checks.length; ci++)
        groups[g][ti].checks[ci].ok ? totalPass++ : totalFail++;

  var sumEl = document.getElementById('vld-summary');
  var allPass = totalFail === 0;
  sumEl.innerHTML = '<div class="vld-summary ' + (allPass ? 'all-pass' : 'has-fail') + '">' +
    (allPass ? '✓ All ' + totalPass + ' checks passed' :
      '✗ ' + totalFail + ' of ' + (totalPass + totalFail) + ' checks failed') +
    '</div>';

  var out = [];
  for (var grpName in groups) {
    var tests = groups[grpName];
    out.push('<div class="vld-group">');
    out.push('<div class="vld-group-title">' + grpName + '</div>');
    out.push('<table class="vld-table">');
    out.push('<tr><th>Test</th><th>Output</th><th>Expected</th><th>Actual</th><th>Δ</th><th>Result</th></tr>');
    for (var ti = 0; ti < tests.length; ti++) {
      var t = tests[ti];
      for (var ci = 0; ci < t.checks.length; ci++) {
        var c = t.checks[ci];
        var rowClass = c.ok ? 'pass' : 'fail';
        out.push('<tr class="' + rowClass + '">');
        if (ci === 0) {
          out.push('<td rowspan="' + t.checks.length + '">' +
            '<strong>' + t.name + '</strong>' +
            '<div class="ref-note">' + t.ref + '</div></td>');
        }
        var delta = isFinite(c.actual) ? (c.actual - c.expected).toFixed(4) : 'NaN';
        out.push('<td>' + c.label + '</td>');
        out.push('<td>' + c.expected + ' ± ' + c.tol + '</td>');
        out.push('<td>' + (isFinite(c.actual) ? c.actual.toFixed(4) : '<span class="err-msg">NaN — raw: "' + c.raw + '"</span>') + '</td>');
        out.push('<td>' + delta + '</td>');
        out.push('<td><span class="badge ' + (c.ok ? 'pass">✓ PASS' : 'fail">✗ FAIL') + '</span></td>');
        out.push('</tr>');
      }
    }
    out.push('</table></div>');
  }
  document.getElementById('vld-results').innerHTML = out.join('');
}

// ── Run on load ──────────────────────────────────────────────────
window.addEventListener('load', function () {
  var groups = {};
  for (var i = 0; i < TESTS.length; i++) {
    var t = TESTS[i];
    var checks = runTest(t);
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push({ name: t.name, ref: t.ref, checks: checks });
  }
  renderResults(groups);
});
