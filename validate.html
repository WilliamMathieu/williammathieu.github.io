    .vld-hero h2{font-family:monospace;font-size:1.35em;margin:0 0 6px;}
    .vld-hero p{font-size:12px;opacity:.85;margin:0;}
    .vld-summary{font-family:monospace;font-size:14px;font-weight:bold;padding:10px 16px;border-radius:4px;margin-bottom:18px;display:inline-block;}
    .vld-summary.all-pass{background:#d4f0d4;color:#1a5c1a;border:1px solid #8fcf8f;}
    .vld-summary.has-fail{background:#fde8e8;color:#8b1a1a;border:1px solid #e08080;}

    .vld-group-title{font-family:monospace;font-size:11px;font-weight:bold;color:#5533aa;text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid #e8e0ff;padding-bottom:4px;margin-bottom:10px;}

    .vld-table th{background:#f0eeff;color:#5533aa;font-family:monospace;padding:6px 10px;text-align:left;border:1px solid #d0c8f0;white-space:nowrap;}
    .vld-table td{padding:5px 10px;border:1px solid #e8e0ff;font-family:monospace;vertical-align:top;}
    .vld-table tr.pass td{background:#f4fdf4;}
    .vld-table tr.fail td{background:#fdf4f4;}
    .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:bold;}
    .badge.pass{background:#2a7a2a;color:white;}
    .badge.fail{background:#c0392b;color:white;}
    .ref-note{font-size:10px;color:#888;font-style:italic;margin-top:3px;}

    #test-dom{display:none !important;}

<!-- ═══════════════════════════════════════════════════════════════
     ISOLATED CALCULATOR LOADER
     Each calculator .js is fetched and executed inside its own function
     scope via new Function(src). This runs the REAL shipped code (no inline
     copies → zero drift) while keeping each file's top-level helpers
     (showResults, rr, showError, drawDiagram, …) local — avoiding the
     global-name collisions that otherwise prevent loading every calculator
     together with plain <script src>. A few reactive tools are driven from
     test setup() hooks via global entry points, so those names are
     re-exported onto window after the file runs.
     ═══════════════════════════════════════════════════════════════ -->
<script>
window.CALC_FILES = [
  'Microstrip.js',
  'Coaxial.js',

  'LinkBudget.js',
  'ArrayFactor.js',
  'AttenuatorDesign.js',
  'BirdcageCoil.js',
  'CLC.js',
  'CapacitorNetwork.js',
  'CoilDesigner.js',
  'CLI.js',
  'ESeries.js',
  'FreqEnergyConverter.js',
  'ImpedanceMatchingNetwork.js',
  'PhaseNoiseJitter.js',
  'PhasedArrayDecoupling.js',
  'SAREstimator.js',
  'SurfaceCoilDesigner.js',
  'TLLoss.js',
  'TwoPortConverter.js',
  'SmithChart.js',
  'SParamPlotter.js',
  'SpiceSim.js',
  'RFSimulator.js'
];
window.CALC_EXPORTS = {
  'NoiseFigure.js':  ['nfBuild', 'nfCalc'],
  'dBmConverter.js': ['updateDbm'],
  'VSWRConverter.js':['vswrUpdate'],
  'FreqEnergyConverter.js': ['feUpdate'],
  'CapacitorNetwork.js':    ['buildInputs', 'calculate'],
  'SmithChart.js':   ['zToGamma', 'gammaToZ'],
  'SParamPlotter.js':['toVSWR', 'toMagDB'],
  'SpiceSim.js':     ['parseSuffix'],
  'RFSimulator.js':  ['cmag', 'C', 'cmul']
};
window.__loadErrors = {};
window.preloadCalculators = async function () {
  for (var i = 0; i < window.CALC_FILES.length; i++) {
    var f = window.CALC_FILES[i];
    try {
      var src = await (await fetch(f)).text();
      var exp = window.CALC_EXPORTS[f];
      if (exp) {
        for (var j = 0; j < exp.length; j++) {
          var n = exp[j];
          src += '\n;try{window[' + JSON.stringify(n) + ']=' + n + ';}catch(e){}';
        }
      }
      (new Function(src))();
    } catch (e) {
      window.__loadErrors[f] = String((e && e.message) || e);
      console.error('[load] ' + f, e);
    }
  }
  // Smoke checks: exercise exposed numeric primitives of the
  // visualization/simulation tools and write results to spans so the
  // standard numeric runner can assert them.
  function setSmoke(id, fn) {
    var el = document.getElementById(id);
    if (!el) return;
    try { el.textContent = String(fn()); } catch (e) { el.textContent = 'ERR:' + e; }
  }
  setSmoke('smoke-smith',       function () { return window.zToGamma(2, 0).re; });          // z=2 → Γ=1/3
  setSmoke('smoke-sparam-vswr', function () { return window.toVSWR({ re: 1/3, im: 0 }); });  // |Γ|=1/3 → VSWR 2
  setSmoke('smoke-sparam-db',   function () { return window.toMagDB({ re: 0.5, im: 0 }); }); // 20log10(0.5)
  setSmoke('smoke-spice',       function () { return window.parseSuffix('1k'); });           // 1000
  setSmoke('smoke-rf',          function () { return window.cmag(window.C(3, 4)); });         // 5
};
</script>

// ── Test runner ─────────────────────────────────────────────────
function readOutput(spec) {
  spec = spec.trim();  // allow 'id ' duplicate keys to read one element with multiple regexes
  if (spec.includes('@')) {
    var parts = spec.split('@');
    var containerId = parts[0], idx = parseInt(parts[1]);
    var vals = document.querySelectorAll('#' + containerId + ' .res-val');
    return vals[idx] ? vals[idx].textContent.trim() : '';
  }
  var el = document.getElementById(spec);
  return el ? el.textContent.trim() : '';
}

function runTest(t) {
  // Optional pre-test setup (reactive tools, NoiseFigure stages, etc.)
  if (t.setup) { t.setup(); return checkOutputs(t); }

  // Set text inputs
  for (var id in (t.inputs || {})) {
    var el = document.getElementById(id);
    if (el) el.value = t.inputs[id];
  }
  // Set selects
  for (var id in (t.selects || {})) {
    var el = document.getElementById(id);
    if (el) el.value = t.selects[id];
  }
  // Click the calculate button
  var btn = document.getElementById(t.button);
  if (btn) btn.click();

  return checkOutputs(t);
}

function checkOutputs(t) {
  var checks = [];
  for (var spec in t.expect) {
    var exp = t.expect[spec];
    var raw = readOutput(spec);
    var actual;
    if (exp.re) {
      // Extract a labelled number from free-form text output (innerHTML tables)
      var mm = raw.match(exp.re);
      actual = mm ? parseFloat(mm[1]) : NaN;
    } else {
      actual = parseFloat(raw);
    }
    var ok = isFinite(actual) && Math.abs(actual - exp.value) <= exp.tol;
    checks.push({ id: spec, label: exp.label, actual: actual, expected: exp.value, tol: exp.tol, raw: raw, ok: ok });
  }
  return checks;
}

// ── Renderer ────────────────────────────────────────────────────
function renderResults(groups) {
  var totalPass = 0, totalFail = 0;
  for (var g in groups)
    for (var ti = 0; ti < groups[g].length; ti++)
      for (var ci = 0; ci < groups[g][ti].checks.length; ci++)
        groups[g][ti].checks[ci].ok ? totalPass++ : totalFail++;

  var sumEl = document.getElementById('vld-summary');
  var allPass = totalFail === 0;
  sumEl.innerHTML = '<div class="vld-summary ' + (allPass ? 'all-pass' : 'has-fail') + '">' +
    (allPass ? '✓ All ' + totalPass + ' checks passed' :
      '✗ ' + totalFail + ' of ' + (totalPass + totalFail) + ' checks failed') +
    '</div>';

  var out = [];
  for (var grpName in groups) {
    var tests = groups[grpName];
    out.push('<div class="vld-group">');
    out.push('<div class="vld-group-title">' + grpName + '</div>');
    out.push('<table class="vld-table">');
    out.push('<tr><th>Test</th><th>Output</th><th>Expected</th><th>Actual</th><th>Δ</th><th>Result</th></tr>');
    for (var ti = 0; ti < tests.length; ti++) {
      var t = tests[ti];
      for (var ci = 0; ci < t.checks.length; ci++) {
        var c = t.checks[ci];
        var rowClass = c.ok ? 'pass' : 'fail';
        out.push('<tr class="' + rowClass + '">');
        if (ci === 0) {
          out.push('<td rowspan="' + t.checks.length + '">' +
            '<strong>' + t.name + '</strong>' +
            '<div class="ref-note">' + t.ref + '</div></td>');
        }
        var delta = isFinite(c.actual) ? (c.actual - c.expected).toFixed(4) : 'NaN';
        out.push('<td>' + c.label + '</td>');
        out.push('<td>' + c.expected + ' ± ' + c.tol + '</td>');
        out.push('<td>' + (isFinite(c.actual) ? c.actual.toFixed(4) : '<span class="err-msg">NaN — raw: "' + c.raw + '"</span>') + '</td>');
        out.push('<td>' + delta + '</td>');
        out.push('<td><span class="badge ' + (c.ok ? 'pass">✓ PASS' : 'fail">✗ FAIL') + '</span></td>');
        out.push('</tr>');
      }
    }
    out.push('</table></div>');
  }
  document.getElementById('vld-results').innerHTML = out.join('');
}

// ── Run on load ──────────────────────────────────────────────────
window.addEventListener('load', async function () {
  await window.preloadCalculators();
  var groups = {};
  for (var i = 0; i < TESTS.length; i++) {
    var t = TESTS[i];
    var checks = runTest(t);
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push({ name: t.name, ref: t.ref, checks: checks });
  }
  renderResults(groups);
});
