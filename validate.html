    .vld-hero{background:linear-gradient(150deg,#2d1066 0%,#5533aa 55%,#7744cc 100%);color:white;padding:28px 20px 22px;border-radius:6px;margin-bottom:22px;}
    .vld-hero h2{font-family:monospace;font-size:1.35em;margin:0 0 6px;}
    .vld-hero p{font-size:12px;opacity:.85;margin:0;}
    .vld-summary{font-family:monospace;font-size:14px;font-weight:bold;padding:10px 16px;border-radius:4px;margin-bottom:18px;display:inline-block;}
    .vld-summary.all-pass{background:#d4f0d4;color:#1a5c1a;border:1px solid #8fcf8f;}
    .vld-summary.has-fail{background:#fde8e8;color:#8b1a1a;border:1px solid #e08080;}
    .vld-group{margin-bottom:22px;}
    .vld-group-title{font-family:monospace;font-size:11px;font-weight:bold;color:#5533aa;text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid #e8e0ff;padding-bottom:4px;margin-bottom:10px;}
    table.vld-table{width:100%;border-collapse:collapse;font-size:12px;}
    .vld-table th{background:#f0eeff;color:#5533aa;font-family:monospace;padding:6px 10px;text-align:left;border:1px solid #d0c8f0;white-space:nowrap;}
    .vld-table td{padding:5px 10px;border:1px solid #e8e0ff;font-family:monospace;vertical-align:top;}
    .vld-table tr.pass td{background:#f4fdf4;}
    .vld-table tr.fail td{background:#fdf4f4;}
    .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:bold;}
    .badge.pass{background:#2a7a2a;color:white;}
    .badge.fail{background:#c0392b;color:white;}
    .ref-note{font-size:10px;color:#888;font-style:italic;margin-top:3px;}
    .err-msg{font-size:11px;color:#c0392b;}

<article>

<div class="vld-hero">
  <h2>Calculator Validation Suite</h2>
  <p>Programmatically exercises each calculator with reference inputs and compares outputs to textbook values. All tests run against the live calculator code — the same code users execute.</p>

<div id="vld-summary"></div>
<div id="vld-results"></div>

<!-- ═══════════════════════════════════════════════════════════════
     HIDDEN TEST DOM — all element IDs required by the .js files
     Must appear BEFORE the <script src> imports below.
     ═══════════════════════════════════════════════════════════════ -->
<div id="test-dom">
  <!-- Microstrip -->
  <input id="ms-h"><input id="ms-w"><input id="ms-t"><input id="ms-er">
  <input id="ms-z0"><input id="ms-h2"><input id="ms-er2">
  <button id="ms-btn1"></button><button id="ms-btn2"></button>
  <span id="ms-z0-out"></span><span id="ms-eeff-out"></span><span id="ms-vp-out"></span>
  <span id="ms-err1"></span><span id="ms-w-out"></span><span id="ms-err2"></span>
  <!-- Coaxial -->
  <input id="cx-d"><input id="cx-D"><input id="cx-er">
  <button id="cx-btn"></button>
  <span id="cx-z0"></span><span id="cx-C"></span><span id="cx-L"></span>
  <span id="cx-vp"></span><span id="cx-fc"></span>
  <!-- Wavelength -->
  <input id="wl-f"><input id="wl-er">
  <select id="wl-fu">
    <option value="1e3">kHz</option>
    <option value="1e6">MHz</option>
    <option value="1e9" selected>GHz</option>
  </select>
  <button id="wl-btn"></button>
  <span id="wl-lam"></span><span id="wl-half"></span><span id="wl-qtr"></span>
  <!-- SkinDepth -->
  <input id="sd-f"><input id="sd-sigma" disabled>
  <select id="sd-fu">
    <option value="1e3">kHz</option>
    <option value="1e6" selected>MHz</option>
    <option value="1e9">GHz</option>
  </select>
  <select id="sd-mat">
    <option value="5.8e7">Copper (5.8×10⁷ S/m)</option>
    <option value="3.77e7">Aluminium</option>
    <option value="6.3e7">Silver</option>
    <option value="4.1e7">Gold</option>
    <option value="1.0e7">Steel</option>
    <option value="custom">Custom σ</option>
  </select>
  <button id="sd-btn"></button>
  <span id="sd-m"></span><span id="sd-um"></span>
  <!-- CPW -->
  <input id="cpw-w"><input id="cpw-s"><input id="cpw-h"><input id="cpw-er">
  <select id="cpw-bg">
    <option value="1">Yes (GCPW)</option>
    <option value="0">No (CPW)</option>
  </select>
  <button id="cpw-btn"></button>
  <span id="cpw-z0"></span><span id="cpw-eeff"></span>
  <span id="cpw-vp"></span><span id="cpw-lam"></span>
  <!-- Shared IDs used by multiple calculators -->
  <span id="error"></span>
  <div id="tool-diagram"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     CALCULATOR SCRIPTS — loaded after DOM so getElementById works
     ═══════════════════════════════════════════════════════════════ -->
<script src="tool-enhancements.js"></script>
<script src="Microstrip.js"></script>
<script src="Coaxial.js"></script>
<script src="Wavelength.js"></script>
<script src="SkinDepth.js"></script>
<script src="CPW.js"></script>

<!-- ═══════════════════════════════════════════════════════════════
     TEST RUNNER
     ═══════════════════════════════════════════════════════════════ -->
<script>
// ── Reference test cases ────────────────────────────────────────
// expect values: the leading float from the output element's textContent.
// e.g. "50.843 Ω" → 50.843,  "300.00 mm" → 300.00,  "2.090 µm" → 2.090
// tol: allowed absolute difference in the same implied units.
const TESTS = [
  {
    group: 'Microstrip',
    name: 'Wide trace (w/h=1.875, FR4)',
    ref: 'Hammerstad-Jensen w/h≥1 branch; hand-calc Z₀=50.84 Ω, εeff=3.325',
    inputs:  { 'ms-h': '1.6', 'ms-w': '3.0', 'ms-t': '0', 'ms-er': '4.4' },
    button:  'ms-btn1',
    expect: {
      'ms-z0-out':   { label: 'Z₀ (Ω)',   value: 50.84, tol: 1.5 },
      'ms-eeff-out': { label: 'εeff',      value: 3.325, tol: 0.05 }
    }
  },
  {
    group: 'Microstrip',
    name: 'Narrow trace (w/h=0.313, FR4)',
    ref: 'Hammerstad-Jensen w/h<1 branch; hand-calc Z₀=112.92 Ω, εeff=2.972',
    inputs:  { 'ms-h': '1.6', 'ms-w': '0.5', 'ms-t': '0', 'ms-er': '4.4' },
    button:  'ms-btn1',
    expect: {
      'ms-z0-out':   { label: 'Z₀ (Ω)', value: 112.92, tol: 2.0 },
      'ms-eeff-out': { label: 'εeff',   value: 2.972,  tol: 0.05 }
    }
  },
  {
    group: 'Microstrip',
    name: 'Inverse synthesis — 50 Ω on FR4, h=1.6 mm → width',
    ref: 'Wheeler synthesis; expected w≈3.07 mm',
    inputs:  { 'ms-z0': '50', 'ms-h2': '1.6', 'ms-er2': '4.4' },
    button:  'ms-btn2',
    expect: {
      'ms-w-out': { label: 'w (mm)', value: 3.07, tol: 0.15 }
    }
  },
  {
    group: 'Coaxial',
    name: '50 Ω air-filled (d=1 mm, D=2.301 mm, εr=1)',
    ref: 'Z₀=60·ln(D/d)=60·ln(2.301)=49.97 Ω',
    inputs:  { 'cx-d': '1.0', 'cx-D': '2.301', 'cx-er': '1' },
    button:  'cx-btn',
    expect: {
      'cx-z0': { label: 'Z₀ (Ω)', value: 49.97, tol: 0.5 }
    }
  },
  {
    group: 'Coaxial',
    name: '75 Ω PTFE-filled (d=1 mm, D=6.122 mm, εr=2.1)',
    ref: 'Z₀=60/√2.1·ln(6.122)=41.41·1.8116=75.0 Ω — checking εr fill correction',
    inputs:  { 'cx-d': '1.0', 'cx-D': '6.122', 'cx-er': '2.1' },
    button:  'cx-btn',
    expect: {
      'cx-z0': { label: 'Z₀ (Ω)', value: 75.0, tol: 0.5 }
    }
  },
  {
    group: 'Wavelength',
    name: '1 GHz in air — λ=300 mm',
    ref: 'λ=c/f; engFmt returns mm',
    inputs:  { 'wl-f': '1', 'wl-er': '1' },
    selects: { 'wl-fu': '1e9' },
    button:  'wl-btn',
    expect: {
      'wl-lam':  { label: 'λ (mm)',   value: 300.00, tol: 0.01 },
      'wl-half': { label: 'λ/2 (mm)', value: 150.00, tol: 0.01 },
      'wl-qtr':  { label: 'λ/4 (mm)', value: 75.00,  tol: 0.01 }
    }
  },
  {
    group: 'Wavelength',
    name: '2.45 GHz in FR4 (εr=4.4) — λ=58.37 mm',
    ref: 'λ=c/(f√εr)=300/(2.45×2.0976)=58.37 mm',
    inputs:  { 'wl-f': '2.45', 'wl-er': '4.4' },
    selects: { 'wl-fu': '1e9' },
    button:  'wl-btn',
    expect: {
      'wl-lam': { label: 'λ (mm)', value: 58.37, tol: 0.1 }
    }
  },
  {
    group: 'Skin Depth',
    name: 'Copper at 1 GHz — δ=2.090 µm',
    ref: 'δ=√(1/(πfμ₀σ)); σ=5.8×10⁷ S/m',
    inputs:  { 'sd-f': '1' },
    selects: { 'sd-fu': '1e9', 'sd-mat': '5.8e7' },
    button:  'sd-btn',
    expect: {
      'sd-um': { label: 'δ (µm)', value: 2.090, tol: 0.02 }
    }
  },
  {
    group: 'Skin Depth',
    name: 'Copper at 100 MHz — δ=6.61 µm (×√10 from 1 GHz)',
    ref: 'δ scales as 1/√f',
    inputs:  { 'sd-f': '100' },
    selects: { 'sd-fu': '1e6', 'sd-mat': '5.8e7' },
    button:  'sd-btn',
    expect: {
      'sd-um': { label: 'δ (µm)', value: 6.609, tol: 0.05 }
    }
  },
  {
    group: 'CPW',
    name: 'CPW (no bottom ground) — w=1mm, s=0.3mm, h=0.635mm, εr=9.9',
    ref: 'Schneider conformal mapping; hand-calc Z₀≈48.57 Ω, εeff≈4.612',
    inputs:  { 'cpw-w': '1.0', 'cpw-s': '0.3', 'cpw-h': '0.635', 'cpw-er': '9.9' },
    selects: { 'cpw-bg': '0' },
    button:  'cpw-btn',
    expect: {
      'cpw-z0':   { label: 'Z₀ (Ω)',  value: 48.57, tol: 2.0 },
      'cpw-eeff': { label: 'εeff',    value: 4.612, tol: 0.05 }
    }
  },
  {
    group: 'CPW',
    name: 'GCPW (bottom ground) — w=1mm, s=0.3mm, h=0.635mm, εr=9.9',
    ref: 'Ghione-Naldi model; hand-calc Z₀≈38.23 Ω, εeff≈7.444',
    inputs:  { 'cpw-w': '1.0', 'cpw-s': '0.3', 'cpw-h': '0.635', 'cpw-er': '9.9' },
    selects: { 'cpw-bg': '1' },
    button:  'cpw-btn',
    expect: {
      'cpw-z0':   { label: 'Z₀ (Ω)', value: 38.23, tol: 2.0 },
      'cpw-eeff': { label: 'εeff',   value: 7.444, tol: 0.05 }
    }
  }
];

// ── Test runner ─────────────────────────────────────────────────
function runTest(t) {
  // Set text inputs
  for (const [id, val] of Object.entries(t.inputs || {})) {
    const el = document.getElementById(id);
    if (el) el.value = val;
  }
  // Set selects
  for (const [id, val] of Object.entries(t.selects || {})) {
    const el = document.getElementById(id);
    if (el) el.value = val;
  }
  // Click the calculate button
  const btn = document.getElementById(t.button);
  if (btn) btn.click();
  // Read and compare outputs
  const checks = [];
  for (const [id, exp] of Object.entries(t.expect)) {
    const el = document.getElementById(id);
    const raw = el ? el.textContent.trim() : '';
    const actual = parseFloat(raw);
    const ok = isFinite(actual) && Math.abs(actual - exp.value) <= exp.tol;
    checks.push({ id, label: exp.label, actual, expected: exp.value, tol: exp.tol, raw, ok });
  }
  return checks;
}

// ── Renderer ────────────────────────────────────────────────────
function renderResults(groups) {
  let totalPass = 0, totalFail = 0;
  // Flatten for summary count
  for (const g of Object.values(groups))
    for (const t of g)
      for (const c of t.checks)
        c.ok ? totalPass++ : totalFail++;

  const sumEl = document.getElementById('vld-summary');
  const allPass = totalFail === 0;
  sumEl.innerHTML = '<div class="vld-summary ' + (allPass ? 'all-pass' : 'has-fail') + '">' +
    (allPass ? '✓ All ' + totalPass + ' checks passed' :
      '✗ ' + totalFail + ' of ' + (totalPass + totalFail) + ' checks failed') +
    '</div>';

  const out = [];
  for (const [grpName, tests] of Object.entries(groups)) {
    out.push('<div class="vld-group">');
    out.push('<div class="vld-group-title">' + grpName + '</div>');
    out.push('<table class="vld-table">');
    out.push('<tr><th>Test</th><th>Output</th><th>Expected</th><th>Actual</th><th>Δ</th><th>Result</th></tr>');
    for (const t of tests) {
      const anyFail = t.checks.some(c => !c.ok);
      for (let i = 0; i < t.checks.length; i++) {
        const c = t.checks[i];
        const rowClass = c.ok ? 'pass' : 'fail';
        out.push('<tr class="' + rowClass + '">');
        if (i === 0) {
          out.push('<td rowspan="' + t.checks.length + '">' +
            '<strong>' + t.name + '</strong>' +
            '<div class="ref-note">' + t.ref + '</div></td>');
        }
        const delta = isFinite(c.actual) ? (c.actual - c.expected).toFixed(4) : 'NaN';
        out.push('<td>' + c.label + '</td>');
        out.push('<td>' + c.expected + ' ± ' + c.tol + '</td>');
        out.push('<td>' + (isFinite(c.actual) ? c.actual.toFixed(4) : '<span class="err-msg">NaN — raw: "' + c.raw + '"</span>') + '</td>');
        out.push('<td>' + delta + '</td>');
        out.push('<td><span class="badge ' + (c.ok ? 'pass">✓ PASS' : 'fail">✗ FAIL') + '</span></td>');
        out.push('</tr>');
      }
    }
    out.push('</table></div>');
  }
  document.getElementById('vld-results').innerHTML = out.join('');
}

// ── Run on load ──────────────────────────────────────────────────
window.addEventListener('load', function () {
  const groups = {};
  for (const t of TESTS) {
    const checks = runTest(t);
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push({ name: t.name, ref: t.ref, checks });
  }
  renderResults(groups);
});
</script>
