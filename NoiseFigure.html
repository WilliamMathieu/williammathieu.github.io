<body>
	<header><h2><a href="index.html" style="color:white;text-decoration:none;">RF Toolbox</a></h2></header>
	<section>
		<nav><h3>Tools</h3><div id="includeIndex"></div></nav>
		<article>
			<h3>Cascaded Noise Figure Calculator</h3>

			<p style="font-size:13px;">Friis formula for cascaded noise figure. Up to 8 stages.</p><br>
			Number of stages: <input type="number" id="nf-n" min="1" max="8" value="3" style="width:50px">
			<button onclick="nfBuild()">Set stages</button><br><br>
			<div id="nf-stages"></div>
			<p>
				\begin{align}
				F_{total} &= F_1 + \frac{F_2-1}{G_1} + \frac{F_3-1}{G_1 G_2} + \cdots
				\end{align}
			</p>
			<div id="error" style="color:#c0392b;font-size:13px;margin-top:6px;"></div>
			<div class="result-box" id="nf-out"><p>Cascaded NF = <span id="nf-nf">—</span></p><p>Total gain = <span id="nf-gain">—</span></p></div>

			<script src="NoiseFigure.js"></script>
		</article>
