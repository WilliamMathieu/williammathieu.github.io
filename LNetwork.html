<body>
	<header><h2><a href="index.html" style="color:white;text-decoration:none;">RF Toolbox</a></h2></header>
	<section>
		<nav><h3>Tools</h3><div id="includeIndex"></div></nav>
		<article>
			<h3>L-Network Impedance Matcher</h3>

			<p style="font-size:13px;">Calculate L and C values to match a source impedance to a load impedance.</p><br>
			Frequency, f: <input type="text" id="ln-f" placeholder="value">
			<select id="ln-fu"><option value="1e6">MHz</option><option value="1e9" selected>GHz</option></select><br>
			Source resistance, R<sub>s</sub>: <input type="text" id="ln-rs" placeholder="Ω" value="50"> Ω<br>
			Load resistance, R<sub>L</sub>: <input type="text" id="ln-rl" placeholder="Ω"> Ω<br><br>
			<button id="ln-btn">Calculate</button>
			<p><span id="ln-out"></span></p>

			<script src="LNetwork.js"></script>
		</article>
	</section>
	<footer><p><a href="index.html">Home</a></p></footer>
