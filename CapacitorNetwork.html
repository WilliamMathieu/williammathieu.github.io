	<title>RF Toolbox</title>
	<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
	<script src="MathJax.js"></script>
	<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
	<script src='https://cdn.jsdelivr.net/npm/bignumber.js@9.1.2/bignumber.min.js'></script>

    $(function(){
      $("#includeIndex").load("index_list.html");
    });
  </script>
	<link rel="stylesheet" href="style.css">

<body>
	<header>
		<h2>RF Toolbox</h2>
	</header>
	<section>
		<nav>
			<h3>Tools</h3>
			<div id="includeIndex"></div>
		</nav>
		<article>
			<h3>Total Capacitance</h3>

			Number of capacitors:
			<input type="number" id="numCaps" min="1" max="20" value="2" style="width:50px">
			&nbsp;
			Connection:
			<select id="mode">
				<option value="parallel">Parallel</option>
				<option value="series" selected>Series</option>
			</select>
			&nbsp;
			Default unit:
			<select id="defaultUnit">
				<option value="uF">uF</option>
				<option value="nF">nF</option>
				<option value="pF" selected>pF</option>
			</select>
			<br><br>
			<button onclick="buildInputs()">Set capacitors</button>
			<br><br>

			<div id="inputs-area"></div>
			<div id="error" style="color:#c0392b; font-size:13px; margin-top:6px;"></div>

			<script src="CapacitorNetwork.js"></script>

			<p>C<sub>total</sub> = <span id="C_out"></span></p>
		</article>
	</section>
	<footer>
		<p><a href="index.html">Home</a></p>
	</footer>
</body>

</html>
