<body>
	<header><h2><a href="index.html" style="color:white;text-decoration:none;">RF Toolbox</a></h2></header>
	<section>
		<nav><h3>Tools</h3><div id="includeIndex"></div></nav>
		<article>
			<h3>Bandpass Filter Calculator</h3>

			<p style="font-size:13px;">Calculate centre frequency, bandwidth, and Q from component values.</p><br>
			Configuration:
			<select id="bp-config">
				<option value="series">Series RLC</option>
				<option value="parallel">Parallel RLC</option>
			</select><br>
			Inductance, L: <input type="text" id="bp-L" placeholder="value">
			<select id="bp-Lu"><option value="1e-3">mH</option><option value="1e-6" selected>uH</option><option value="1e-9">nH</option></select><br>
			Capacitance, C: <input type="text" id="bp-C" placeholder="value">
			<select id="bp-Cu"><option value="1e-6">uF</option><option value="1e-9">nF</option><option value="1e-12" selected>pF</option></select><br>
			Resistance, R: <input type="text" id="bp-R" placeholder="&#937;"> &#937;<br><br>
			<button id="bp-btn">Calculate</button>
			<p>\begin{align} f_0 &= \frac{1}{2\pi\sqrt{LC}} \quad Q = \frac{\omega_0 L}{R} \end{align}</p>
			<div class="result-box" id="bp-out"><p>f&#8320; = —</p></div>

			<script src="BandpassCalc.js"></script>
		</article>
	</section>
	<footer><p><a href="index.html">Home</a></p></footer>
