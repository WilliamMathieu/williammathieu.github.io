<body>
	<header><h2><a href="index.html" style="color:white;text-decoration:none;">RF Toolbox</a></h2></header>
	<section>
		<nav><h3>Tools</h3><div id="includeIndex"></div></nav>
		<article>
			<h3>Dipole Antenna Calculator</h3>

			Frequency, f: <input type="text" id="dp-f" placeholder="value">
			<select id="dp-fu"><option value="1e6" selected>MHz</option><option value="1e9">GHz</option></select><br>
			Velocity factor, k: <input type="text" id="dp-k" value="0.95"><br><br>
			<button id="dp-btn">Calculate</button>
			<p>\begin{align} L_{half} &= \frac{k \cdot c}{2f} \end{align}</p>
			<div id="error" style="color:#c0392b;font-size:13px;margin-top:6px;"></div>
			<div class="result-box" id="dp-out"><p>Full wavelength λ = <span id="dp-lam">—</span></p><p>Half-wave dipole total length = <span id="dp-half">—</span></p><p>Each arm length = <span id="dp-arm">—</span></p><p>Quarter-wave monopole = <span id="dp-mono">—</span></p></div>

			<script src="Dipole.js"></script>
		</article>
	</section>
