<!DOCTYPE html>
<html lang="en">
<head>
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-6R4JGG0586"></script>
	<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-6R4JGG0586');</script>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>RF Toolbox — Smith Chart</title>
	<script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
	<script>$(function(){$("#includeIndex").load("index_list.html");});</script>
	<link rel="stylesheet" href="style.css">
	<style>
		canvas { display:block; margin:0 auto; cursor:crosshair; }
		.sc-controls { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:10px; font-size:13px; }
		.sc-controls input { width:80px; }
		.sc-info { font-family:monospace; font-size:12px; background:#f4f4f0; padding:8px 10px; border-left:3px solid #AA77FF; border-radius:0 4px 4px 0; margin-top:8px; min-height:20px; }
		.sc-points { font-family:monospace; font-size:12px; margin-top:8px; }
		.sc-points table { border-collapse:collapse; }
		.sc-points td, .sc-points th { padding:2px 10px 2px 0; }
	</style>
</head>
<body>
	<header><h2><a href="index.html" style="color:white;text-decoration:none;">RF Toolbox</a></h2></header>
	<section>
		<nav><h3>Tools</h3><div id="includeIndex"></div></nav>
		<article>
			<h3>Smith Chart</h3>
			<div class="sc-controls">
				<label>Z\u2080: <input type="text" id="sc-z0" value="50"> \u03A9</label>
				<label>R: <input type="text" id="sc-r" placeholder="\u03A9"></label>
				<label>X: <input type="text" id="sc-x" placeholder="\u03A9 (+ ind, \u2212 cap)"></label>
				<button onclick="scAddPoint()">Plot point</button>
				<button onclick="scClear()">Clear</button>
				<button onclick="scDrawChart()">Redraw</button>
			</div>
			<p style="font-size:12px;margin-bottom:6px;">Click anywhere on the chart to read off impedance. Or enter R+jX above to plot a point.</p>
			<canvas id="sc-canvas" width="480" height="480"></canvas>
			<div class="sc-info" id="sc-info">Click on the chart to read impedance values.</div>
			<div class="sc-points" id="sc-points"></div>
		</article>
	</section>
	<footer><p><a href="index.html">Home</a></p></footer>
	<script src="SmithChart.js"></script>
</body>
</html>
