<body>
	<header><h2><a href="index.html" style="color:white;text-decoration:none;">RF Toolbox</a></h2></header>
	<section>
		<nav><h3>Tools</h3><div id="includeIndex"></div></nav>
		<article>
			<h3>Skin Depth Calculator</h3>

			Frequency, f: <input type="text" id="sd-f" placeholder="value">
			<select id="sd-fu">
				<option value="1e3">kHz</option>
				<option value="1e6" selected>MHz</option>
				<option value="1e9">GHz</option>
			</select><br>
			Conductor material:
			<select id="sd-mat">
				<option value="5.8e7">Copper (5.8 × 10⁷ S/m)</option>
				<option value="3.77e7">Aluminium (3.77 × 10⁷ S/m)</option>
				<option value="1.0e7">Steel (~10⁷ S/m)</option>
				<option value="6.3e7">Silver (6.3 × 10⁷ S/m)</option>
				<option value="4.1e7">Gold (4.1 × 10⁷ S/m)</option>
				<option value="custom">Custom</option>
			</select><br>
			Conductivity (if custom): <input type="text" id="sd-sigma" placeholder="S/m"><br><br>
			<button id="sd-btn">Calculate</button>
			<p><span id="sd-out"></span></p>
			<p>\begin{align} \delta &= \sqrt{\frac{2}{\omega\mu\sigma}} \end{align}</p>

			<script src="SkinDepth.js"></script>
		</article>
	</section>
	<footer><p><a href="index.html">Home</a></p></footer>
</body>
