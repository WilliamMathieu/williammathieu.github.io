<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Frequency Guess | RF Toolbox</title>
	<link rel="stylesheet" href="style.css">
	<style>
		.game-wrap{text-align:center;padding:20px;}
		.msg{font-family:monospace;font-size:13px;color:#AA77FF;min-height:18px;margin:8px 0;}
		.hud{font-family:monospace;font-size:13px;margin-bottom:6px;}
		.options{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:14px auto;max-width:480px;}
		.opt-btn{font-family:monospace;font-size:13px;padding:9px 16px;border:1px solid #AA77FF;border-radius:6px;background:#fff;cursor:pointer;min-width:110px;}
		.opt-btn:hover{background:#C9EEFF;}
		.opt-btn.correct{background:#00cc77;color:#fff;border-color:#00cc77;}
		.opt-btn.wrong{background:#cc3333;color:#fff;border-color:#cc3333;}
		.lb-wrap{max-width:400px;margin:12px auto 0;text-align:left;}
		.lb-title{font-family:monospace;font-size:13px;color:#AA77FF;margin-bottom:4px;}
		button{margin:6px;}
	</style>
</head>
<body class="no-nav">
	<header><h2><a href="index.html" style="color:white;text-decoration:none;">RF Toolbox</a></h2></header>
	<section>
		<div class="breadcrumb"><a href="index.html">⌂ RF Toolbox</a> / <span id="bc-title"></span></div>
		<article>
			<div class="game-wrap">
				<h3>Frequency Guess</h3>
				<p style="font-family:monospace;font-size:12px;">Listen to the tone and pick the closest frequency.</p>
				<div class="hud">Round: <span id="round">0</span>/10 &nbsp; Score: <span id="score">0</span></div>
				<div class="msg" id="msg">Click Start to begin</div>
				<button id="play-btn" onclick="playTone()" style="display:none;">&#9654; Play tone</button>
				<div class="options" id="options"></div>
				<div id="score-entry"></div>
				<button onclick="startGame()">Start</button>
				<div class="lb-wrap">
					<div class="lb-title">&#127942; Leaderboard</div>
					<div id="lb"></div>
				</div>
			</div>
		</article>
	</section>
	<footer><p><a href="index.html">Home</a> . <a href="games.html">Game Zone</a></p></footer>
	<script src="scores.js"></script>
	<script>
	var audioCtx=null;
	var FREQS=[100,200,300,440,500,600,800,1000,1200,1500,2000,2500,3000,4000,5000,6000,8000,10000];
	var round,score,targetFreq,answered,gameActive=false;

	function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

	function playFreq(freq){
		var ctx=getCtx();var osc=ctx.createOscillator(),gain=ctx.createGain();
		osc.connect(gain);gain.connect(ctx.destination);osc.type='sine';osc.frequency.value=freq;
		gain.gain.setValueAtTime(0,ctx.currentTime);gain.gain.linearRampToValueAtTime(0.3,ctx.currentTime+0.05);
		gain.gain.setValueAtTime(0.3,ctx.currentTime+0.8);gain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.0);
		osc.start();osc.stop(ctx.currentTime+1.1);
	}

	function playTone(){if(targetFreq)playFreq(targetFreq);}
	function formatFreq(f){return f>=1000?(f/1000)+'kHz':f+'Hz';}

	function startGame(){
		round=0;score=0;gameActive=true;
		document.getElementById('score').textContent=0;
		document.getElementById('score-entry').innerHTML='';
		nextRound();
	}

	function nextRound(){
		round++;answered=false;
		document.getElementById('round').textContent=round;
		targetFreq=FREQS[Math.floor(Math.random()*FREQS.length)];
		var opts=new Set([targetFreq]);
		while(opts.size<4){opts.add(FREQS[Math.floor(Math.random()*FREQS.length)]);}
		opts=Array.from(opts).sort(function(a,b){return a-b;});
		var html='';
		opts.forEach(function(f){html+='<button class="opt-btn" onclick="guess('+f+',this)">'+formatFreq(f)+'</button>';});
		document.getElementById('options').innerHTML=html;
		document.getElementById('play-btn').style.display='inline-block';
		document.getElementById('msg').textContent='Round '+round+'/10 — click Play then pick the frequency';
		setTimeout(function(){playFreq(targetFreq);},300);
	}

	function guess(f,btn){
		if(answered)return;answered=true;
		var btns=document.querySelectorAll('.opt-btn');
		btns.forEach(function(b){b.disabled=true;});
		if(f===targetFreq){
			btn.classList.add('correct');score+=100;document.getElementById('score').textContent=score;
			document.getElementById('msg').textContent='Correct! It was '+formatFreq(targetFreq);
		}else{
			btn.classList.add('wrong');
			btns.forEach(function(b){if(b.textContent===formatFreq(targetFreq))b.classList.add('correct');});
			document.getElementById('msg').textContent='Wrong! It was '+formatFreq(targetFreq);
		}
		if(round>=10){
			setTimeout(function(){
				gameActive=false;
				document.getElementById('msg').textContent='Game over! Score: '+score+'/1000';
				document.getElementById('play-btn').style.display='none';
				document.getElementById('options').innerHTML='';
				showScoreEntry('score-entry','frequency',score,function(){renderLeaderboard('frequency','lb');});
			},1400);
		}else{setTimeout(nextRound,1400);}
	}

	renderLeaderboard('frequency','lb');
	</script>
<script>
(function(){
  var t = document.title.replace(' | RF Toolbox','').replace(' | RF Toolbox Wiki','');
  var el = document.getElementById('bc-title');
  if(el) el.textContent = t;
})();
</script>
</body>
</html>
